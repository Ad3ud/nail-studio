<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 110" width="320" height="110">
  <defs>
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feGaussianBlur stdDeviation="12" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur1"/>
      <feGaussianBlur stdDeviation="5" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- S.A. -->
  <text
    x="160"
    y="36"
    text-anchor="middle"
    font-family="'Dancing Script', 'Georgia', serif"
    font-size="28"
    font-weight="700"
    letter-spacing="6"
    fill="#fff8e7"
    filter="url(#neon-soft)"
    opacity="0.95"
  >S . A .</text>

  <!-- Beauty -->
  <text
    x="160"
    y="88"
    text-anchor="middle"
    font-family="'Dancing Script', 'Georgia', serif"
    font-size="62"
    font-weight="700"
    fill="#fff0c0"
    filter="url(#neon)"
    opacity="0.98"
  >Beauty</text>
</svg>
